apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillio-backend
  namespace: skillio-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skillio-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: skillio-backend
    spec:
      containers:
        - name: backend
          image: nikolatane/skillio-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: skillio-app-config
            - secretRef:
                name: skillio-db-credentials
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: skillio-storage
              mountPath: /app/storage
      volumes:
        - name: skillio-storage
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillio-frontend
  namespace: skillio-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skillio-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: skillio-frontend
    spec:
      containers:
        - name: frontend
          image: nikolatane/skillio-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"