name: Skillio AI — CI/CD Pipeline

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main

env:
  BACKEND_IMAGE: nikolatane/skillio-backend
  FRONTEND_IMAGE: nikolatane/skillio-frontend

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install ruff linter
        run: pip install ruff

      - name: Run ruff on backend
        run: ruff check backend/app --output-format=github
        continue-on-error: true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run ESLint on frontend
        run: npm run lint
        working-directory: frontend
        continue-on-error: true

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for backend image
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend image
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "=== Skillio AI — Build Complete ==="
          echo "Backend: nikolatane/skillio-backend"
          echo "Frontend: nikolatane/skillio-frontend"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"

  deploy:
    name: Deploy to K3D Cluster
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set kubectl context
        run: kubectl config use-context k3d-skillio-cluster

      - name: Verify cluster connection
        run: kubectl cluster-info --context k3d-skillio-cluster

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl apply -f k8s/01-configmap-secret.yaml
          kubectl apply -f k8s/02-statefulset-db.yaml
          kubectl apply -f k8s/03-services.yaml
          kubectl apply -f k8s/04-deployments.yaml
          kubectl apply -f k8s/05-ingress.yaml

      - name: Force pull new images and restart
        run: |
          kubectl rollout restart deployment/skillio-backend -n skillio-prod
          kubectl rollout restart deployment/skillio-frontend -n skillio-prod

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/skillio-backend -n skillio-prod --timeout=120s
          kubectl rollout status deployment/skillio-frontend -n skillio-prod --timeout=120s

      - name: Verify deployment
        run: kubectl get pods -n skillio-prod